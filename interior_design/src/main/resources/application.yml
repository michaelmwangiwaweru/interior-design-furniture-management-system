server:
  port: 9193



spring:
  datasource:
    url: jdbc:mysql://localhost:3306/interior-design?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&max_allowed_packet=1073741824
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB







logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace
    root: INFO
    org.springframework.security: TRACE          # ← very detailed
    org.springframework.security.web: TRACE
    org.springframework.security.web.csrf: TRACE
    org.springframework.security.web.access: TRACE
    org.springframework.web.filter: DEBUG
    com.dailycodework: DEBUG                     # your own package




jwt:
  secret: yourVeryStrongSecretKeyHereChangeThisAtLeast64CharactersLong1234567890
  expiration: 86400000


hikari:
  maximum-pool-size: 10
  connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
        connection:
          handling_mode: delayed_acquisition_and_release_after_transaction   # ← THIS FIXES THE ROLLBACK ERROR

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB